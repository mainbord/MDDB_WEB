spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/mddb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mcorp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mcorp}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.liquibase.change-log=classpath:database/changelog/db.changelog-master.xml

spring.threads.virtual.enabled=true

#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL94Dialect
spring.jpa.hibernate.ddl-auto: validate
spring.jpa.generate-ddl: true

spring.application.name=mddb


# Enable JSON-formatted structured logging
