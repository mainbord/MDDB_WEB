services:

  db:
    image: postgres
    restart: always
    # set shared memory limit when using docker-compose
    shm_size: 512mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_PASSWORD: mcorp
      POSTGRES_USER: mcorp
      POSTGRES_DB: mddb
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mcorp -d mddb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  liquibase:
    image: liquibase/liquibase:4.33
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/main/resources/database/changelog:/liquibase/changelog:ro
    command:
      - --url=jdbc:postgresql://db:5432/mddb
      - --username=mcorp
      - --password=mcorp
      - --changeLogFile=changelog/db.changelog-master.xml
      - update
